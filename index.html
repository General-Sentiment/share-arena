<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Share Are.na</title>
  <meta name="description" content="Turn an Are.na channel or block into a social-ready image." />
  <link rel="preconnect" href="https://api.are.na" />
  <link rel="preconnect" href="https://images.are.na" crossorigin />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <svg class="brand-mark" viewBox="0 0 150.38 88.986" role="img" aria-label="Are.na">
        <path fill="currentColor" d="M148.93 62.356l-20.847-16.384c-1.276-1-1.276-2.642 0-3.645l20.848-16.38c1.28-1.002 1.815-2.695 1.19-3.76-.626-1.062-2.374-1.44-3.88-.84l-24.79 9.874c-1.507.606-2.927-.22-3.153-1.83L114.57 2.926C114.34 1.317 113.13 0 111.877 0c-1.247 0-2.456 1.317-2.68 2.925l-3.73 26.467c-.228 1.61-1.646 2.434-3.155 1.83l-24.38-9.71c-1.512-.602-3.975-.602-5.483 0l-24.384 9.71c-1.508.604-2.928-.22-3.154-1.83L41.186 2.925C40.956 1.317 39.748 0 38.5 0c-1.252 0-2.463 1.317-2.688 2.925l-3.73 26.467c-.226 1.61-1.645 2.434-3.153 1.83L4.14 21.35c-1.507-.603-3.252-.223-3.878.838-.625 1.066-.092 2.76 1.184 3.76l20.85 16.38c1.277 1.003 1.277 2.645 0 3.646L1.446 62.356C.166 63.358-.364 65.152.26 66.34c.627 1.19 2.372 1.668 3.877 1.064l24.567-9.866c1.51-.603 2.914.218 3.125 1.828l3.544 26.696c.214 1.607 1.618 2.923 3.12 2.923 1.5 0 2.905-1.315 3.12-2.923l3.55-26.696c.21-1.61 1.62-2.43 3.122-1.828l24.164 9.698c1.506.606 3.97.606 5.477 0l24.16-9.698c1.504-.603 2.91.218 3.125 1.828l3.55 26.696c.212 1.607 1.617 2.923 3.115 2.923 1.502 0 2.907-1.315 3.12-2.923l3.55-26.696c.216-1.61 1.62-2.43 3.124-1.828l24.57 9.866c1.5.604 3.25.125 3.876-1.063.627-1.186.094-2.98-1.185-3.982zM95.89 46.18L77.53 60.315c-1.285.99-3.393.99-4.674 0L54.49 46.18c-1.284-.99-1.294-2.62-.02-3.625l18.4-14.493c1.274-1.005 3.363-1.005 4.638 0l18.4 14.493c1.277 1.004 1.267 2.634-.02 3.626z"></path>
      </svg>
      <span class="brand-text">Share Are.na</span>
    </div>
    <p id="status" class="status" role="status" aria-live="polite"></p>
  </header>

  <div class="scroll">
  <main class="app">
    <form id="form" class="input-row" autocomplete="off">
      <input
        id="input"
        class="input"
        type="text"
        name="q"
        placeholder="are.na channel or block"
        spellcheck="false"
        aria-label="Are.na channel or block"
      />
      <button id="go" class="btn btn-go" type="submit">Load</button>
    </form>

    <!-- Composer: preview first, then options -->
    <section id="exporter" class="exporter" hidden>
      <div class="stage">
        <canvas id="canvas" aria-label="Preview"></canvas>
      </div>

      <div class="actions">
        <a id="metaLink" class="meta-line" target="_blank" rel="noopener"></a>
        <button id="download" class="btn btn-download" type="button">Download .png</button>
      </div>

      <div class="options">
        <div class="opt-row" id="layoutRow" hidden>
          <span class="opt-label">Layout</span>
          <div class="seg" id="layoutToggle" role="group" aria-label="Layout">
            <button type="button" data-layout="single" class="seg-btn is-active">Single</button>
            <button type="button" data-layout="grid" class="seg-btn">Grid 2×2</button>
          </div>
        </div>
        <div class="opt-row">
          <label class="opt-label" for="sizeSelect">Size</label>
          <select id="sizeSelect" class="select"></select>
        </div>
        <div class="opt-row">
          <span class="opt-label">Background</span>
          <div class="seg" id="bgToggle" role="group" aria-label="Background">
            <button type="button" data-bg="white" class="seg-btn is-active">White</button>
            <button type="button" data-bg="black" class="seg-btn">Black</button>
          </div>
        </div>
        <div class="opt-row">
          <span class="opt-label">Image</span>
          <div class="seg" id="fitToggle" role="group" aria-label="Image fit">
            <button type="button" data-fit="contain" class="seg-btn is-active">Fit</button>
            <button type="button" data-fit="cover" class="seg-btn">Fill</button>
          </div>
        </div>
        <div class="opt-row opt-row-chips">
          <button id="borderToggle" class="chip is-active" type="button" aria-pressed="true">Border</button>
          <button id="captionToggle" class="chip is-active" type="button" aria-pressed="true">Caption</button>
          <button id="logoToggle" class="chip" type="button" aria-pressed="false">
            <svg class="chip-mark" viewBox="0 0 150.38 88.986" aria-hidden="true">
              <path fill="currentColor" d="M148.93 62.356l-20.847-16.384c-1.276-1-1.276-2.642 0-3.645l20.848-16.38c1.28-1.002 1.815-2.695 1.19-3.76-.626-1.062-2.374-1.44-3.88-.84l-24.79 9.874c-1.507.606-2.927-.22-3.153-1.83L114.57 2.926C114.34 1.317 113.13 0 111.877 0c-1.247 0-2.456 1.317-2.68 2.925l-3.73 26.467c-.228 1.61-1.646 2.434-3.155 1.83l-24.38-9.71c-1.512-.602-3.975-.602-5.483 0l-24.384 9.71c-1.508.604-2.928-.22-3.154-1.83L41.186 2.925C40.956 1.317 39.748 0 38.5 0c-1.252 0-2.463 1.317-2.688 2.925l-3.73 26.467c-.226 1.61-1.645 2.434-3.153 1.83L4.14 21.35c-1.507-.603-3.252-.223-3.878.838-.625 1.066-.092 2.76 1.184 3.76l20.85 16.38c1.277 1.003 1.277 2.645 0 3.646L1.446 62.356C.166 63.358-.364 65.152.26 66.34c.627 1.19 2.372 1.668 3.877 1.064l24.567-9.866c1.51-.603 2.914.218 3.125 1.828l3.544 26.696c.214 1.607 1.618 2.923 3.12 2.923 1.5 0 2.905-1.315 3.12-2.923l3.55-26.696c.21-1.61 1.62-2.43 3.122-1.828l24.164 9.698c1.506.606 3.97.606 5.477 0l24.16-9.698c1.504-.603 2.91.218 3.125 1.828l3.55 26.696c.212 1.607 1.617 2.923 3.115 2.923 1.502 0 2.907-1.315 3.12-2.923l3.55-26.696c.216-1.61 1.62-2.43 3.124-1.828l24.57 9.866c1.5.604 3.25.125 3.876-1.063.627-1.186.094-2.98-1.185-3.982zM95.89 46.18L77.53 60.315c-1.285.99-3.393.99-4.674 0L54.49 46.18c-1.284-.99-1.294-2.62-.02-3.625l18.4-14.493c1.274-1.005 3.363-1.005 4.638 0l18.4 14.493c1.277 1.004 1.267 2.634-.02 3.626z"></path>
            </svg>
            <span>logo</span>
          </button>
        </div>
      </div>
    </section>

    <section id="intro" class="intro">
      <p class="intro-lead">Paste an Are.na channel or block, or start from a featured channel</p>
      <p class="credit">created with love by <a href="https://jon-kyle.com" target="_blank" rel="noopener">jon-kyle</a></p>
      <div class="examples" id="examples"></div>
    </section>
  </main>
  </div>

  <!-- Channel block selector: horizontal strip -->
  <nav id="strip" class="strip" hidden aria-label="Blocks in channel">
    <div class="strip-inner">
      <div class="strip-label" id="stripLabel"></div>
      <div class="strip-track" id="stripTrack"></div>
    </div>
  </nav>

  <script src="app.js"></script>
</body>
</html>
